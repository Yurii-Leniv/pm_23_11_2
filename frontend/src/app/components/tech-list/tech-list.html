<div class="list-container">
  <app-tech-form (addTech)="onAddTech($event)"></app-tech-form>

  <hr>
  <h2>Мій стек технологій</h2>

  @for (item of technologies; track item.id) {
    <app-tech-item
      [tech]="item"
      (toggleStatus)="handleToggle($event)">
    </app-tech-item>
  } @empty {
    <p>Список технологій порожній.</p>
  }
</div>
